<div class="min-h-screen bg-gradient-to-br from-primary via-secondary to-tertiary">

    <div class="sticky top-0 z-50">
        <header class="relative bg-secondary shadow-md z-10">
            <div class="mx-auto p-4 flex items-center justify-between">
                <!--Branding -->
                <div class="flex items-center">
                    <img src="logo.png" alt="Logo" class="h-10 object-scale-down">
                    <div class="ml-2 text-3xl font-bold text-background">
                        Woofs
                    </div>
                </div>

                <!-- Profile -->
                 @if (sessionData$ | async; as sessionData) {
                    <div class="flex items-center gap-3">
                        @if (sessionData.profile_pic_url){
                            <img class="w-10 h-10 rounded-full border border-background object-cover" [src]="profilePicApiUrl + sessionData.profile_pic_url" alt="profile" />
                        }
                        @else{
                            <img class="w-10 h-10 rounded-full border border-background object-cover" src="default_profile_pic.png" alt="profile" />
                        }

                        <div class="flex flex-col leading-tight">
                            <span class="font-semibold hover:underline text-background">{{sessionData.username}} </span>

                            <button (click)="logOut()" class="text-xs text-background hover:text-red-500 text-left">
                                Logout
                            </button>
                        </div>
                    </div>
                }
            </div>
        </header>

        <div class="bg-white border-background/40 border-y mx-auto gap-3 flex flex-col items-center shadow-md">
            <button
                class="bg-success hover:bg-success-dark/70 text-white mt-3 mx-8 px-5 py-2 w-3/4 max-w-xl rounded-full" (click)="createPost()">
                Create a New Post
            </button>

            <!-- Search for users -->
            <input type="text" placeholder="Search for other pup profiles..."
                class="w-7/8 bg-gray-100 mb-3 mx-8 px-4 py-1 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-background" />
        </div>
    </div>

</div>
