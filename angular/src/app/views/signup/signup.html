<div class="min-h-screen bg-gradient-to-br from-primary via-secondary to-tertiary flex flex-col items-center justify-center p-6">
    <h1 class="text-3xl mb-4 text-background"> Woofs </h1>
        <!-- Logo -->


    <div class="w-full max-w-md backdrop-blur-lg bg-white/50 border border-background/40 rounded-3xl shadow-2xl p-8">
        <div class="flex flex-col m-4">

            <input class="mb-4 px-4 py-2 bg-white rounded-lg focus:ring-2 focus:ring-success focus:outline-none"
            type="text"
            placeholder="Username"
            [(ngModel)]="username"
            />
              
            <input class="mb-4 px-4 py-2 bg-white rounded-lg focus:ring-2 focus:ring-success focus:outline-none"
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            />

            <input class="mb-4 px-4 py-2 bg-white rounded-lg focus:ring-2 focus:ring-success focus:outline-none"
            type="password"
            placeholder="Password"
            [(ngModel)]="password"
            />

            <button class="mt-4 p-2 rounded-lg bg-background text-white"
            (click)="signUp()">
            Sign Up 
            </button>
          
        </div>
    </div>
</div>
